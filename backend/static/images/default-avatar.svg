<svg width="120" height="150" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="120" height="150" fill="url(#bg)" rx="10"/>

  <!-- 人物頭部 -->
  <circle cx="60" cy="55" r="25" fill="#ffffff" opacity="0.9"/>

  <!-- 人物身體 -->
  <ellipse cx="60" cy="120" rx="35" ry="40" fill="#ffffff" opacity="0.9"/>

  <!-- 文字 -->
  <text x="60" y="140" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" opacity="0.8">學生照片</text>
</svg>